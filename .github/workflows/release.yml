name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "version to release (e.g. 3.3.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: update refs and tag release
        run: |
          TAG="v${{ github.event.inputs.version }}"
          find examples modules -name "*.tf" -o -name "README.md" | \
            xargs sed -i "s|?ref=v[0-9]*\.[0-9]*\.[0-9]*|?ref=${TAG}|g"
          git add examples modules
          git commit -m "chore(release): $TAG"
          git tag "$TAG"
          git push origin main "$TAG"

      - name: create github release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ github.event.inputs.version }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
