cluster:
  network:
    cni:
      name: none
    dnsDomain: cluster.local
    podSubnets:
      - "fc00:1::/96"
    # /108 is the largest supported IPv6 service range; local uses /112.
    # 20 bits is hardcoded here: https://github.com/kubernetes/kubernetes/blob/ec16c90aaf5d1f0606747c421c8680bb2b243d4e/cmd/kube-apiserver/app/options/validation.go#L40
    serviceSubnets:
      - "fc00::/112"
  proxy:
    disabled: true
machine:
  features:
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    rbac: true
    stableHostname: true
    hostDNS:
      enabled: true
      forwardKubeDNSToHost: false # doesn't work on singlestack ipv6! 169.254.116.108 address is hardcoded!
      resolveMemberNames: true
    kubePrism:
      enabled: true
  kubelet:
    clusterDNS:
      - "fc00::a"
    extraConfig:
      address: "::"
      healthzBindAddress: "::"
  sysctls:
    net.core.somaxconn: 65535
    net.core.netdev_max_backlog: 4096
    net.ipv6.conf.all.forwarding: 1
    net.ipv4.ip_forward: 1
---
apiVersion: v1alpha1
kind: KubeSpanConfig
enabled: true
advertiseKubernetesNetworks: false
allowDownPeerBypass: false
harvestExtraEndpoints: false
mtu: 1420
filters:
  endpoints:
    - ::/0
    - fc00::/112
    - fc00:1::/96
