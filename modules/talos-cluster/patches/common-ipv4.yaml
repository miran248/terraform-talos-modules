cluster:
  network:
    cni:
      name: none
    dnsDomain: cluster.local
    podSubnets:
      - "10.244.0.0/16"
    serviceSubnets:
      - "10.96.0.0/12"
  proxy:
    disabled: true
machine:
  features:
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    rbac: true
    kubePrism:
      enabled: true
  kubelet:
    clusterDNS:
      - "10.96.0.10"
    extraConfig:
      address: "0.0.0.0"
      healthzBindAddress: "0.0.0.0"
  sysctls:
    net.core.somaxconn: 65535
    net.core.netdev_max_backlog: 4096
    net.ipv4.ip_forward: 1
---
apiVersion: v1alpha1
kind: ResolverConfig
# hostDNS disabled — listens on 127.0.0.53:53 which conflicts with CoreDNS hostNetwork: true
# TODO: re-enable once a better solution is found for cross-cloud DNS via KubeSpan
hostDNS:
  enabled: false
  forwardKubeDNSToHost: false
---
apiVersion: v1alpha1
kind: KubeSpanConfig
enabled: true
advertiseKubernetesNetworks: false
allowDownPeerBypass: false
harvestExtraEndpoints: false
mtu: 1420
# filters:
#   endpoints:
#     - "0.0.0.0/0"
