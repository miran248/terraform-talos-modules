cluster:
  network:
    cni:
      name: none
    dnsDomain: cluster.local
    podSubnets:
      - "fc00:1::/96" # ensures the correct IP family is selected
    # /108 is the largest supported IPv6 service range; this module uses /112.
    # 20 address bits are hardcoded here: https://github.com/kubernetes/kubernetes/blob/ec16c90aaf5d1f0606747c421c8680bb2b243d4e/cmd/kube-apiserver/app/options/validation.go#L40
    serviceSubnets:
      - "fc00::/112"
  proxy:
    disabled: true
machine:
  features:
    apidCheckExtKeyUsage: true
    diskQuotaSupport: true
    rbac: true
    kubePrism:
      enabled: true
  kubelet:
    clusterDNS:
      - "fc00::a"
    # https://kubernetes.io/docs/reference/command-line-tools-reference/kubelet/
    # extraArgs:
    #   cloud-provider: external
    #   rotate-server-certificates: true
    # https://kubernetes.io/docs/reference/config-api/kubelet-config.v1beta1/#kubelet-config-k8s-io-v1beta1-KubeletConfiguration
    extraConfig:
      address: "::"
      healthzBindAddress: "::" # must be ::, ::1 didn't work
      # rotateCertificates: true # already true and can't be set again
  sysctls:
    net.core.somaxconn: 65535
    net.core.netdev_max_backlog: 4096
    net.ipv6.conf.all.forwarding: 1
    net.ipv4.ip_forward: 1
---
apiVersion: v1alpha1
kind: ResolverConfig
hostDNS:
  enabled: true
  forwardKubeDNSToHost: false
---
apiVersion: v1alpha1
kind: KubeSpanConfig
enabled: true
advertiseKubernetesNetworks: false
allowDownPeerBypass: false
harvestExtraEndpoints: false
mtu: 1420
