apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: google
spec:
  provider:
    gcpsm:
      projectID: miran248-talos-modules-dev
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hcloud
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: google
  data:
    - secretKey: token
      remoteRef:
        key: hcloud
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: scaleway
  namespace: kube-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: google
  target:
    template:
      data:
        SCW_DEFAULT_ZONE: fr-par-1 # TODO: add zone to scaleway GCP secret and read via {{ .zone }}
        SCW_DEFAULT_PROJECT_ID: "{{ .project_id }}"
        SCW_ACCESS_KEY: "{{ .access_key }}"
        SCW_SECRET_KEY: "{{ .secret_key }}"
  dataFrom:
    - extract:
        key: scaleway
